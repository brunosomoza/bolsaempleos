name: "Security Scan PHP"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  psalm-scan:
    name: Psalm Security Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Ejecuta el escáner de Psalm configurado para seguridad
      - name: Psalm Security Scan
        uses: docker://ghcr.io/psalm/psalm-security-scan

      # Sube los resultados en formato SARIF a GitHub Code Scanning
      - name: Upload Security Analysis to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
